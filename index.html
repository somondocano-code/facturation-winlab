<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration Winlab</title>
  <!-- Conexión con tu archivo de estilos CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PANTALLA DE INICIO DE SESIÓN / CONTRASEÑA -->
  <div id="loginScreen" style="display: flex; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; justify-content: center; align-items: center; z-index: 10000; font-family: -apple-system, sans-serif;">
    <div class="card" style="width: 350px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); background: #1e293b; border: 1px solid #334155; border-radius: 8px;">
      <h2 style="color: #ffffff; margin-bottom: 10px; font-size: 24px; font-weight: bold;">Atelier Winlab</h2>
      <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Saisir le mot de passe pour accéder</p>
      <form onsubmit="verificarPassword(event)">
        <div style="margin-bottom: 20px; text-align: left;">
          <input type="password" id="adminPassword" placeholder="Mot de passe" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #475569; background-color: #0f172a; color: white; font-size: 16px; box-sizing: border-box;" required>
        </div>
        <button type="submit" style="width: 100%; padding: 12px; background-color: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer;">Déverrouiller 🔓</button>
      </form>
      <div id="loginError" style="color: #ef4444; font-size: 13px; margin-top: 15px; display: none; font-weight: 600;">Mot de passe incorrect</div>
    </div>
  </div>

  <!-- CONTENEDOR PRINCIPAL DE LA APLICACIÓN -->
  <div id="appContainer" class="app-container" style="display: none;">
    <div class="tab-navigation">
      <button class="nav-btn active" onclick="switchTab('facturacion')">📝 Nouvelle Facture</button>
      <button class="nav-btn" onclick="switchTab('caisse')">📊 Historique & Caisse</button>
    </div>

    <!-- Pestaña de Facturación -->
    <div id="facturacion" class="tab-content">
      <div class="card">
        <div class="card-header">🛠️ Atelier Winlab — Saisie de Facture</div>
        <form id="formFacture" onsubmit="guardarFacturaReal(event)">
          
          <div class="form-group">
            <label for="clientNom">Nom du Client :</label>
            <input type="text" id="clientNom" placeholder="Ex: Jean Dupuis" required>
          </div>
          
          <div class="form-group">
            <label for="clientCourriel">Courriel du Client :</label>
            <input type="email" id="clientCourriel" placeholder="Ex: client@courriel.com" required>
          </div>

          <div style="margin-top: 20px; margin-bottom: 10px;">
            <label style="font-size: 15px; color: #007bff; display: block; border-bottom: 1px solid #dee2e6; padding-bottom: 5px; margin-bottom: 15px;">🛠️ Travaux et Réparations</label>
            <div id="contenedorReparaciones">
              <div class="fila-reparacion" style="display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-end;">
                <div style="flex: 2; display: flex; flex-direction: column; gap: 5px;">
                  <label style="font-size: 12px; color: #666;">Appareil :</label>
                  <input type="text" class="item-appareil" placeholder="Ex: iPhone 13 Pro" required>
                </div>
                <div style="flex: 3; display: flex; flex-direction: column; gap: 5px;">
                  <label style="font-size: 12px; color: #666;">Type de Réparation :</label>
                  <input type="text" class="item-reparation" placeholder="Ex: Changement d'écran" required>
                </div>
                <div style="flex: 1.5; display: flex; flex-direction: column; gap: 5px;">
                  <label style="font-size: 12px; color: #666;">Prix (CAD) :</label>
                  <input type="number" class="item-precio" step="0.01" min="0" placeholder="0.00" required>
                </div>
                <button type="button" style="padding: 10px; background: transparent; border: none; cursor: default; width: 38px;"></button>
              </div>
            </div>
            
            <button type="button" class="btn-primary" style="background-color: #007bff; margin-top: 15px; padding: 10px 15px; font-size: 14px;" onclick="agregarFilaReparacion()">➕ Ajouter une autre réparation</button>
          </div>

          <button type="submit" class="submit-btn" style="margin-top: 20px;">💾 Encaisser & Afficher Facture</button>
        </form>
      </div>
    </div>

    <!-- Pestaña de Caja e Historial -->
    <div id="caisse" class="tab-content" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" id="totalCaisseDia">$0.00</div>
          <div class="stat-lbl">Chiffre d'affaires total</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="totalFacturesContador">0</div>
          <div class="stat-lbl">Factures émises</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">📋 Liste des Factures Enregistrées</div>
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Facture</th>
                <th>Client</th>
                <th>Appareils / Réparations</th>
                <th>Base</th>
                <th>TPS</th>
                <th>TVQ</th>
                <th>Total</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="listaFacturesBody">
              <!-- Las facturas de Supabase se cargarán aquí -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL PARA VER / IMPRIMIR FACTURAS -->
  <div id="modalFactura" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <div class="modal-actions-bar">
        <button class="btn-secondary" onclick="cerrarModal()">❌ Fermer</button>
        <button class="btn-primary" onclick="descargarFacturaPDF()">📥 Télécharger PDF</button>
        <button class="btn-primary" style="background-color: #28a745;" onclick="imprimirContenidoModal()">🖨️ Imprimer</button>
      </div>
      <div id="modalCuerpoFactura" class="invoice-print-area">
        <!-- Contenido dinámico de la factura -->
      </div>
    </div>
  </div>

  <!-- LIBRERÍAS EXTERNAS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- SCRIPTS EN LÍNEA (FUNCIONES DE INTERFAZ RÁPIDAS) -->
  <script>
    function agregarFilaReparacion() {
        const contenedor = document.getElementById('contenedorReparaciones');
        const nuevaFila = document.createElement('div');
        nuevaFila.className = 'fila-reparacion';
        nuevaFila.style = "display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-end;";
        
        nuevaFila.innerHTML = `
            <div style="flex: 2; display: flex; flex-direction: column; gap: 5px;">
                <input type="text" class="item-appareil" placeholder="Ex: iPhone 13 Pro" required>
            </div>
            <div style="flex: 3; display: flex; flex-direction: column; gap: 5px;">
                <input type="text" class="item-reparation" placeholder="Ex: Changement d'écran" required>
            </div>
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 5px;">
                <input type="number" class="item-precio" step="0.01" min="0" placeholder="0.00" required>
            </div>
            <button type="button" style="padding: 10px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; width: 38px; font-weight: bold;" onclick="eliminarFilaReparacion(this)">✕</button>
        `;
        contenedor.appendChild(nuevaFila);
    }

    function eliminarFilaReparacion(boton) {
        boton.parentElement.remove();
    }
  </script>

  <!-- CONEXIÓN AL SCRIPT DE LÓGICA Y BASE DE DATOS (SUPABASE / CONTRASEÑA) -->
  <script src="script.js"></script>

</body>
</html>
